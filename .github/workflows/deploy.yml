name: GitHub Pages にデプロイ

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: ビルド
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: Astro ビルド
        run: npm run build

      - name: Pages アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: デプロイ
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages を設定
        uses: actions/configure-pages@v4

      - name: GitHub Pages にデプロイ
        uses: actions/deploy-pages@v4
        id: deployment
